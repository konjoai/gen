name: ci

# Every gate blocks. No continue-on-error, no advisory steps, no bypass flags.
# A failing gate fails the build (charter §4.6 / §7).

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gauntlet-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch from the official index; everything else is pinned in pyproject.
          pip install "torch==2.5.1" --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"

      - name: Dependency provenance (verify_deps)
        run: python scripts/verify_deps.py

      - name: Lint (ruff)
        run: ruff check src tests scripts

      - name: Format check (ruff format)
        run: ruff format --check src tests scripts

      - name: Type check (mypy)
        run: mypy

      - name: Tests (pytest)
        run: pytest -q

      - name: Gauntlet sanity (fast, end-to-end)
        run: python scripts/run_gauntlet.py attention --quick
